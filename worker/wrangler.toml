name = "pi-hai-ai"
main = "worker.js"
compatibility_date = "2024-11-01"

# 非機密設定（key 不放這裡，用 secret）
[vars]
ALLOWED_ORIGIN = "https://bme9675010.github.io"
# MiniMax 端點與模型（依你的帳號可能要改，見 README）
MINIMAX_ENDPOINT = "https://api.minimaxi.chat/v1/text/chatcompletion_v2"
MINIMAX_MODEL = "MiniMax-Text-01"

# 雲端同步用的 KV（執行 `wrangler kv namespace create SYNC` 後把 id 貼進來）
[[kv_namespaces]]
binding = "SYNC"
id = "d760253f9db24725b6ced1fa78842db8"

# 即時編輯鎖用的 Durable Object（免費方案用 SQLite-backed）
[[durable_objects.bindings]]
name = "ROOM"
class_name = "FamilyRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FamilyRoom"]

# 每 10 分鐘 ping Render 服務，避免冷啟動延遲
[triggers]
crons = ["*/10 * * * *"]
